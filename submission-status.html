<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Submission Status | Ascent Tax Academy</title>
  <link rel="icon" type="image/png" href="assets/ascent_logo.png">
  <style>
    :root {
      --bg-a: #051427;
      --bg-b: #0c2a54;
      --card: #ffffff;
      --text: #0f2842;
      --muted: #4f657c;
      --ok: #1ea75a;
      --ok-soft: rgba(30, 167, 90, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Source Sans 3", Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, var(--bg-a), var(--bg-b));
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .status-card {
      width: min(640px, 94vw);
      background: var(--card);
      border-radius: 16px;
      border: 1px solid #d7e2ef;
      box-shadow: 0 18px 40px rgba(4, 22, 43, 0.35);
      padding: 28px 22px;
      text-align: center;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 8px;
    }

    .brand img {
      width: 84px;
      height: auto;
      display: block;
    }

    h1 {
      margin: 10px 0 6px;
      font-size: clamp(1.4rem, 4.4vw, 2rem);
      line-height: 1.3;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.02rem;
      line-height: 1.6;
    }

    .tick-wrap {
      width: 108px;
      height: 108px;
      margin: 18px auto 14px;
      border-radius: 999px;
      background: var(--ok-soft);
      display: grid;
      place-items: center;
    }

    .checkmark {
      width: 74px;
      height: 74px;
    }

    .checkmark circle {
      fill: none;
      stroke: var(--ok);
      stroke-width: 3;
      stroke-dasharray: 220;
      stroke-dashoffset: 220;
      animation: drawCircle 0.55s ease-out forwards;
    }

    .checkmark path {
      fill: none;
      stroke: var(--ok);
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 56;
      stroke-dashoffset: 56;
      animation: drawTick 0.35s 0.5s ease-out forwards;
    }

    .meta {
      margin-top: 16px;
      font-size: 0.95rem;
      color: #5c738b;
    }

    .meta a {
      color: #1f5d97;
      font-weight: 700;
      text-decoration: none;
    }

    .meta a:hover { text-decoration: underline; }

    @keyframes drawCircle {
      to { stroke-dashoffset: 0; }
    }

    @keyframes drawTick {
      to { stroke-dashoffset: 0; }
    }
  </style>
</head>
<body>
  <main class="status-card" role="status" aria-live="polite">
    <div class="brand">
      <img src="assets/ascent_logo.png" alt="Ascent Tax Academy">
    </div>

    <div class="tick-wrap" aria-hidden="true">
      <svg class="checkmark" viewBox="0 0 72 72">
        <circle cx="36" cy="36" r="30"></circle>
        <path d="M22 37.5 L32 47.5 L50 28.5"></path>
      </svg>
    </div>

    <h1 id="status-title">Form Submitted Successfully</h1>
    <p id="status-message">Thank you. Our team has received your request and will contact you soon.</p>

    <p class="meta">
      Return to <a href="/">Ascent Tax Academy</a>
    </p>
  </main>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const type = (params.get('type') || 'contact').toLowerCase();
      const title = document.getElementById('status-title');
      const message = document.getElementById('status-message');

      if (type === 'enrollment') {
        title.textContent = 'Enrollment Request Submitted';
        message.textContent = 'Thank you. Our counseling team will contact you shortly with your next-step learning plan.';
      } else {
        title.textContent = 'Message Submitted Successfully';
        message.textContent = 'Thank you for contacting us. Our team will respond to your query soon.';
      }
    })();
  </script>
</body>
</html>
